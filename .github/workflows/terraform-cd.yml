name: CD - Cloudflare Email Routing (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      cloudflare_api_email:
        description: Cloudflare account email (required if using API Key)
        required: false
        type: string
      account_id:
        description: Cloudflare Account ID
        required: true
        type: string
      zone_id:
        description: Cloudflare Zone ID
        required: true
        type: string
      email_routing_enabled:
        description: Enable Cloudflare Email Routing
        required: false
        type: boolean
        default: true
      destination_addresses:
        description: Destination emails as HCL list, e.g. ["hello@example.com"]
        required: false
        type: string
        default: "[]"
      email_aliases:
        description: Email aliases as HCL map, e.g. {"contact@x.com"=["hello@x.com"]}
        required: false
        type: string
        default: "{}"
      catch_all:
        description: Catch-all config as HCL object, e.g. {enabled=false, destination=""}
        required: false
        type: string
        default: "{}"
      custom_rules:
        description: Custom rules as HCL list of objects
        required: false
        type: string
        default: "[]"
      manage_dns_records:
        description: Manage DNS records (MX, SPF) for Email Routing
        required: false
        type: boolean
        default: false
      add_spf_record:
        description: Add SPF TXT record
        required: false
        type: boolean
        default: true

env:
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_api_key: ${{ secrets.CLOUDFLARE_API_KEY }}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="cloudflare_api_email=${{ github.event.inputs.cloudflare_api_email }}" \
            -var="account_id=${{ github.event.inputs.account_id }}" \
            -var="zone_id=${{ github.event.inputs.zone_id }}" \
            -var="email_routing_enabled=${{ github.event.inputs.email_routing_enabled }}" \
            -var="destination_addresses=${{ github.event.inputs.destination_addresses }}" \
            -var="email_aliases=${{ github.event.inputs.email_aliases }}" \
            -var="catch_all=${{ github.event.inputs.catch_all }}" \
            -var="custom_rules=${{ github.event.inputs.custom_rules }}" \
            -var="manage_dns_records=${{ github.event.inputs.manage_dns_records }}" \
            -var="add_spf_record=${{ github.event.inputs.add_spf_record }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="cloudflare_api_email=${{ github.event.inputs.cloudflare_api_email }}" \
            -var="account_id=${{ github.event.inputs.account_id }}" \
            -var="zone_id=${{ github.event.inputs.zone_id }}" \
            -var="email_routing_enabled=${{ github.event.inputs.email_routing_enabled }}" \
            -var="destination_addresses=${{ github.event.inputs.destination_addresses }}" \
            -var="email_aliases=${{ github.event.inputs.email_aliases }}" \
            -var="catch_all=${{ github.event.inputs.catch_all }}" \
            -var="custom_rules=${{ github.event.inputs.custom_rules }}" \
            -var="manage_dns_records=${{ github.event.inputs.manage_dns_records }}" \
            -var="add_spf_record=${{ github.event.inputs.add_spf_record }}"
